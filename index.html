<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Auto Fill Promotion Image</title>
    <style>
        :root { --momo-pink: #d82d8b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fdf2f8; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; margin-bottom: 25px; }
        h2 { color: var(--momo-pink); margin: 0 0 20px 0; font-size: 22px; text-align: center; }
        .input-item { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; color: #333; }
        input:focus { border-color: var(--momo-pink); background: #fff; }
        button { width: 100%; background: var(--momo-pink); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 12px rgba(216, 45, 139, 0.3); }
        canvas { max-width: 100%; height: auto; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); cursor: crosshair; }
        .tip { font-size: 11px; color: #bbb; margin-top: 15px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Tạo Ảnh Tự Động</h2>
        <div class="input-item">
            <label>THỜI GIAN (IPHONE)</label>
            <input type="text" id="iptTime" value="9:41">
        </div>
        <div class="input-item">
            <label>HỌ VÀ TÊN</label>
            <input type="text" id="iptName" placeholder="Nhập tên...">
        </div>
        <div class="input-item">
            <label>SỐ ĐIỆN THOẠI</label>
            <input type="text" id="iptPhone" placeholder="Nhập SĐT...">
        </div>
        <button onclick="downloadImg()">TẢI ẢNH VỀ MÁY</button>
        <div class="tip">Mẹo: Click vào ảnh bên dưới để xem tọa độ X, Y nếu muốn chỉnh vị trí chữ.</div>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    // ĐƯỜNG DẪN ĐẾN FILE ẢNH TRONG GIT CỦA BẠN
    img.src = 'image.png'; 

    img.onload = () => render();

    function render() {
        // Thiết lập kích thước chuẩn theo ảnh gốc
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const name = document.getElementById('iptName').value;
        const phone = document.getElementById('iptPhone').value;
        const time = document.getElementById('iptTime').value;

        // --- 1. VẼ GIỜ IPHONE (Góc trái trên) ---
        // Màu đen tuyệt đối, font đậm
        ctx.fillStyle = "#000000";
        ctx.font = "bold 34px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(time, 95, 85); 

        // --- 2. VẼ THÔNG TIN (Họ tên & SĐT) ---
        // Màu xám chuẩn thanh nhập liệu iOS (#3c3c3c)
        ctx.fillStyle = "#3c3c3c"; 
        ctx.font = "400 36px -apple-system, BlinkMacSystemFont, sans-serif";
        ctx.textAlign = "left";

        // Tọa độ đã đo khớp với các ô trống trong ảnh bạn gửi
        ctx.fillText(name, 115, 698); 
        ctx.fillText(phone, 115, 810); 
    }

    // Tự động vẽ lại khi người dùng đang gõ (Real-time)
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', render);
    });

    // Hàm đo tọa độ khi click (Dành cho bạn tinh chỉnh)
    canvas.addEventListener('mousedown', function(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));
        console.log(`Toạ độ hiện tại: X=${x}, Y=${y}`);
        // Hiển thị alert để bạn copy số dán vào code nếu cần
        // alert(`X=${x}, Y=${y}`); 
    });

    function downloadImg() {
        const link = document.createElement('a');
        link.download = 'Momo_Result.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
