<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Coords Finder</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1c1c1e; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .control-panel { background: #2c2c2e; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        label { font-size: 12px; width: 60px; color: #aaa; }
        input { background: #3a3a3c; border: none; padding: 8px; border-radius: 8px; color: white; width: 100%; }
        .coords-input { width: 60px !important; text-align: center; background: #d82d8b !important; }
        canvas { max-width: 100%; height: auto; border: 1px solid #444; cursor: move; }
        .status { background: #d82d8b; padding: 10px; border-radius: 10px; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3 style="margin:0 0 15px 0; color:#d82d8b">Căn Chỉnh Tọa Độ</h3>
        
        <div class="input-group">
            <label>Giờ</label>
            <input type="text" id="iptTime" value="14:36">
            <input type="number" id="xTime" class="coords-input" value="65">
            <input type="number" id="yTime" class="coords-input" value="45">
        </div>

        <div class="input-group">
            <label>Họ Tên</label>
            <input type="text" id="iptName" value="Quang">
            <input type="number" id="xName" class="coords-input" value="115">
            <input type="number" id="yName" class="coords-input" value="700">
        </div>

        <div class="input-group">
            <label>SĐT</label>
            <input type="text" id="iptPhone" value="02982828282">
            <input type="number" id="xPhone" class="coords-input" value="115">
            <input type="number" id="yPhone" class="coords-input" value="810">
        </div>

        <div class="status">Kéo chữ trên ảnh hoặc chỉnh số để tìm vị trí chuẩn!</div>
    </div>

    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'image.png'; // File trong git của bạn

    img.onload = () => render();

    function render() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        // Lấy giá trị từ input
        const timeVal = document.getElementById('iptTime').value;
        const nameVal = document.getElementById('iptName').value;
        const phoneVal = document.getElementById('iptPhone').value;

        const xt = document.getElementById('xTime').value;
        const yt = document.getElementById('yTime').value;
        const xn = document.getElementById('xName').value;
        const yn = document.getElementById('yName').value;
        const xp = document.getElementById('xPhone').value;
        const yp = document.getElementById('yPhone').value;

        // Vẽ Giờ
        ctx.fillStyle = "black";
        ctx.font = "bold 26px -apple-system, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(timeVal, xt, yt);

        // Vẽ Họ Tên & SĐT
        ctx.fillStyle = "#3c3c3c";
        ctx.font = "400 34px -apple-system, sans-serif";
        ctx.fillText(nameVal, xn, yn);
        ctx.fillText(phoneVal, xp, yp);
    }

    // Lắng nghe thay đổi để vẽ lại
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', render);
    });

    // Tính năng Click để lấy tọa độ nhanh
    canvas.addEventListener('mousedown', function(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));
        console.log(`X: ${x}, Y: ${y}`);
        // Bạn có thể dùng console để xem hoặc copy trực tiếp
    });
</script>
</body>
</html>
